<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdminPlayz Social Links</title>
  <link rel="icon" type="image/x-icon" href="./test.ico">
  <meta name="description" content="Connect with Admin Playz across all social platforms.">

  <meta property="og:type" content="website">
  <meta property="og:title" content="AdminPlayz Social Links">
  <meta property="og:description" content="Connect with Admin Playz across Roblox, YouTube, Discord, TikTok, Snapchat, and more.">
  <meta property="og:image" content="./Remove%20background%20project.png">
  <meta property="og:url" content="https://adminplayz.com">

  <style>
    /* --- RESET & BASE --- */
    *{box-sizing:border-box;margin:0;padding:0}
    
    html,body{
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        color: #1f2937;
        background: linear-gradient(135deg,#e6ffff 0%,#33ccff 100%);
        background-attachment: fixed;
        overflow-x: hidden;
    }
    
    /* --- ANIMATED GRID BACKGROUND --- */
    .background{
        position:fixed;
        top:-50vh;
        left:-50vw;
        width:200vw;
        height:200vh;
        transform:rotate(-12deg);
        background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><rect width="30" height="30" fill="rgba(255, 255, 255, 0.25)"/><rect x="30" y="30" width="30" height="30" fill="rgba(255, 255, 255, 0.25)"/></svg>');
        z-index:-1;
        will-change:background-position;
        animation:scrollGrid 3s linear infinite;
    }

    @keyframes scrollGrid{
      0%{background-position:0 0}
      100%{background-position:60px 60px}
    }
    
    /* --- MAIN LAYOUT --- */
    .app{
        position:relative;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content: flex-start; /* Start from top to prevent excessive scrolling */
        min-height:100vh;
        padding: 2rem; /* Reduced from 8rem */
        padding-top: 4rem; 
    }

    .hero{
        text-align:center;
        margin: 0 0 2.5rem 0; /* Tightened margins */
        animation:fadeInDown .8s ease-out;
    }

    .hero h1{
        font-size:2rem;
        font-weight:700;
        margin-bottom:0.5rem;
        background:linear-gradient(120deg,#000,#00000090,#000);
        background-size:200% auto;
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        animation:gradientFlow 3s linear infinite;
        text-shadow:0 4px 18px rgba(0,0,0,.15);
    }

    .hero p{
        font-size:1rem;
        color:#4b5563;
        transition:transform .3s ease;
    }

    /* --- SOCIAL GRID --- */
    .social-grid{
        display:grid;
        grid-template-columns:1fr;
        gap:1rem;
        max-width:800px;
        width:100%;
        animation:fadeInUp .8s ease-out;
    }

    .link-card{
        padding:1.5rem;
        border-radius:1rem;
        color:#fff;
        display:flex;
        align-items:flex-start;
        gap:1rem;
        cursor:pointer;
        border:1px solid rgba(255,255,255,.1);
        box-shadow:0 10px 25px rgba(0,0,0,.2);
        transition:all .4s cubic-bezier(.4,0,.2,1);
        text-decoration:none;
        position:relative;
        overflow:hidden;
        background-size:200% 200%!important;
        background-position:center!important;
    }

    .link-card:hover{
        box-shadow:0 16px 35px rgba(0,0,0,.3);
        transform:scale(1.02) translateY(-3px);
    }

    .icon-wrapper{
        background-color:rgba(255,255,255,0.15);
        padding:.5rem;
        border-radius:12px;
        display:flex;
        align-items:center;
        justify-content:center;
        transition:all .5s ease;
    }

    .icon{width:2rem;height:2rem; object-fit: contain;}

    .label-container{display:flex;flex-direction:column;flex-grow:1}
    .link-label{font-size:1.25rem;font-weight:600; text-shadow:0 2px 10px rgba(0,0,0,0.2)}
    .link-description{font-size:.875rem;opacity:.9;margin-top:.15rem;}

    /* --- VIDEO SECTION --- */
    .latest-video-section{
        margin: 4rem 0 2rem;
        width: 100%;
        max-width: 800px;
        animation: fadeIn 1s ease-out;
    }

    .latest-video-section h2{
        text-align:center;
        font-size:1.8rem;
        margin-bottom:1.5rem;
    }

    .video-container{
        position:relative;
        width:100%;
        padding-bottom:56.25%;
        background:rgba(0,0,0,.1);
        border-radius:1rem;
        overflow:hidden;
        box-shadow:0 20px 40px rgba(0,0,0,0.2);
    }

    .video-container iframe{
        position:absolute;
        top:0;left:0;width:100%;height:100%;border:none;
    }

    /* --- MODAL SYSTEM --- */
    .modal-backdrop{
        position:fixed;inset:0;
        background-color:rgba(0,0,0,.7);
        display:flex;align-items:center;justify-content:center;
        z-index:100;opacity:0;pointer-events:none;
        transition:opacity .3s ease;
        backdrop-filter:blur(10px);
    }
    .modal-backdrop.active{opacity:1;pointer-events:all}
    .modal{
        background:rgba(25, 25, 30, 0.95);
        border:1px solid rgba(255,255,255,0.1);
        border-radius:1.5rem;
        padding:2rem;
        max-width:450px;
        width:90%;
        transform:scale(.9);
        transition:all .3s cubic-bezier(.4,0,.2,1);
        color:#fff;
    }
    .modal.active{transform:scale(1)}
    .modal h2{margin-bottom:1.5rem; font-size: 1.5rem;}
    .modal .link-list{display:grid;gap:0.8rem}
    .modal a{
        text-decoration:none;color:#fff;
        background:rgba(255,255,255,0.05);
        padding:1rem;border-radius:0.75rem;
        border:1px solid rgba(255,255,255,0.1);
        transition:0.2s;
    }
    .modal a:hover{background:rgba(255,255,255,0.15); transform: translateX(5px);}
    .close-btn{
        margin-top:1.5rem; width:100%; padding:0.8rem;
        background:#fff; border:none; border-radius:0.5rem;
        font-weight:bold; cursor:pointer;
    }

    /* --- CARD GRADIENTS --- */
    .bg-twitter{background: linear-gradient(135deg, #1DA1F2, #0d8bd9);}
    .bg-discord{background: linear-gradient(135deg, #5865F2, #4752c4);}
    .bg-youtube{background: linear-gradient(135deg, #FF0000, #cc0000);}
    .bg-roblox{background: linear-gradient(135deg, #000000, #444444);}
    .bg-tiktok{background: linear-gradient(135deg, #000000, #25F4EE);}
    .bg-snapchat{background: linear-gradient(135deg, #FFFC00, #e6e300); color: #000;}

    /* --- RESPONSIVE --- */
    @media (min-width:768px){
      .social-grid{grid-template-columns: 1fr 1fr;}
      .hero h1{font-size:3rem}
    }

    @media (max-width:767px){
      .app{padding-top: 3rem;}
      .hero h1{font-size:1.75rem}
    }

    @keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes gradientFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}

    .corner-image {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        width: 5rem;
        height: 5rem;
        opacity: 0.6;
        z-index: 10;
        pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  
  <div class="app">
    <div class="hero">
      <h1>Admin Playz</h1>
      <p>Connect with me across the web</p>
    </div>

    <div class="social-grid" id="socialGrid"></div>

    <div class="latest-video-section">
      <h2>Latest Content</h2>
      <div class="video-container" id="latestVideo"></div>
      <div id="videoTitle" style="text-align: center; margin-top: 1rem; font-weight: 600;"></div>
    </div>

    <footer>
      <p style="margin: 2rem 0; opacity: 0.6; font-size: 0.8rem;">&copy; 2025 Admin Playz. All rights reserved.</p>
    </footer>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modalContent">
      <h2 id="modalTitle"></h2>
      <div class="link-list" id="modalLinks"></div>
      <button class="close-btn" id="closeModal">Close</button>
    </div>
  </div>

  <script>
    const SOCIAL_LINKS=[
      {
        name:"Roblox",
        icon:'<img class="icon" src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/0/e/e/0eeeb19633422b1241f4306419a0f15f39d58de9.png">',
        description:"Join the community",
        type:"multiple",
        links:[
          {name:"Profile",url:"https://www.roblox.com/users/1433939513/profile"},
          {name:"Fan Club",url:"https://www.roblox.com/communities/10352325/The-Admin-Playz-Fan-Club#!/about"},
          {name:"The Admin Studio",url:"https://www.roblox.com/communities/7162718/The-Admin-Studio#!/about"}
        ]
      },
      {
        name:"YouTube",
        icon:'<img class="icon" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">',
        description:"Watch the latest videos",
        type:"multiple",
        links:[
          {name:"Main Channel",url:"https://www.youtube.com/@adminplayz"},
          {name:"Shorts Channel",url:"https://www.youtube.com/@AdminPlayzShorts"}
        ]
      },
      {
        name:"Discord",
        url:"https://discord.gg/kJrKzj7rgd",
        icon:'<img class="icon" src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">',
        description:"Join the Lounge",
        type:"single"
      },
      {
        name:"Twitter",
        url:"https://x.com/AdmisPlayz",
        icon:'<img class="icon" src="https://www.iconpacks.net/icons/2/free-twitter-logo-icon-2429-thumb.png">',
        description:"@AdmisPlayz",
        type:"single"
      },
      {
        name:"TikTok",
        url:"https://www.tiktok.com/@adminplayzz",
        icon:'<img class="icon" src="https://cdn.pixabay.com/photo/2021/06/15/12/28/tiktok-6338432_960_720.png">',
        description:"Follow for updates",
        type:"single"
      },
      {
        name:"Snapchat",
        url:"https://www.snapchat.com/@admisplayz",
        icon:'<img class="icon" src="https://cdn.worldvectorlogo.com/logos/snapchat-logo-3.svg">',
        description:"Add me on Snap",
        type:"single"
      }
    ];

    const socialGrid=document.getElementById("socialGrid");
    const modalBackdrop=document.getElementById("modalBackdrop");
    const modalContent=document.getElementById("modalContent");
    const modalTitle=document.getElementById("modalTitle");
    const modalLinks=document.getElementById("modalLinks");
    const closeModalBtn=document.getElementById("closeModal");

    function closeModal(){
      modalBackdrop.classList.remove("active");
      modalContent.classList.remove("active");
    }
    
    closeModalBtn.addEventListener("click",closeModal);
    modalBackdrop.addEventListener("click",e=>{if(e.target===modalBackdrop)closeModal()});

    function openModal(title,links){
      modalTitle.textContent=title;
      modalLinks.innerHTML="";
      links.forEach(link=>{
        const a=document.createElement("a");
        a.href=link.url;
        a.target="_blank";
        a.textContent=link.name;
        modalLinks.appendChild(a);
      });
      modalBackdrop.classList.add("active");
      modalContent.classList.add("active");
    }

    SOCIAL_LINKS.forEach(item=>{
      const card=document.createElement("div");
      card.className=`link-card bg-${item.name.toLowerCase()}`;
      card.innerHTML=`
        <div class="icon-wrapper">${item.icon}</div>
        <div class="label-container">
          <span class="link-label">${item.name}</span>
          <span class="link-description">${item.description}</span>
        </div>
      `;
      card.addEventListener("click",()=>{
        if(item.type==="single") window.open(item.url,"_blank");
        else openModal(item.name, item.links);
      });
      socialGrid.appendChild(card);
    });

    async function fetchLatestVideo(){
      try{
        const response=await fetch("https://raw.githubusercontent.com/xD8998/adminplayz/refs/heads/main/devtest/link?"+new Date().getTime());
        const text=await response.text();
        const [url, title]=text.split("\n");
        const videoId=url.split("v=")[1]?.split("&")[0];
        if(videoId){
          document.getElementById("latestVideo").innerHTML=`<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
          document.getElementById("videoTitle").textContent=title || "";
        }
      }catch(e){ console.error(e); }
    }
    fetchLatestVideo();
  </script>
</body>
</html>
